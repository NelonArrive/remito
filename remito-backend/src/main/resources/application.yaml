spring:
  profiles:
    default: dev

server:
  port: 8080

api:
  prefix: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: remito